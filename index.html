<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lavanderia</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <main>
        <!-- Logo da lavanderia -->
        <img src="image.png" alt="Logo da Lavanderia" id="logo">

        <!-- Título e subtítulo -->
        <h1>Bem-vindo à LavTudo</h1>
        <p>Entre com o email ou clique em esqueceu a senha </p>

        <!-- Campo de email -->
        <input type="email" placeholder="Digite seu email" required>

        <!-- Campo de senha -->
        <input type="password" placeholder="Digite sua senha" required>

        <!-- Esqueceu a senha -->
        <p id="sen">Esqueceu a senha?</p>

        <!-- Botão de entrar -->
        <button>Entrar</button>
    </main>
</body>
</html>
